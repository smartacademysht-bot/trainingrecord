<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Manager Justification Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Vazirmatn:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    body { font-family: 'Inter', 'Vazirmatn', sans-serif; background-color: transparent; }
    .bg-mesh-container { position: fixed; inset: 0; z-index: -10; background-color: #f8fafc; overflow: hidden; pointer-events: none; }
    .blob { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.6; }
    @keyframes float-1 { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(5vw, -10vh) scale(1.1); } }
    .blob-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: #a5b4fc; animation: float-1 35s infinite ease-in-out; }
    .blob-2 { top: 20%; right: -15%; width: 45vw; height: 45vw; background: #f9a8d4; animation: float-1 40s infinite ease-in-out reverse; }
    .blob-3 { bottom: -15%; left: 15%; width: 55vw; height: 55vw; background: #67e8f9; animation: float-1 38s infinite ease-in-out; }
    @media (max-width: 768px) {
        tr { display: grid !important; grid-template-columns: 1fr auto; grid-template-areas: "name time" "details details" "status status" "note note"; background: rgba(255, 255, 255, 0.6) !important; border-radius: 1.5rem !important; padding: 1.25rem !important; margin-bottom:1rem; border: 1px solid rgba(255,255,255,0.8) !important; }
        td { display: block !important; padding: 0 !important; border: none !important; width: 100% !important; }
        td:nth-child(1) { grid-area: name; } td:nth-child(2) { grid-area: details; margin-bottom: 1rem; } td:nth-child(3) { grid-area: time; text-align: right; } td:nth-child(4) { grid-area: status; margin-bottom: 0.75rem; } td:nth-child(5) { grid-area: note; }
        thead { display: none !important; } tbody { display: flex !important; flex-direction: column !important; } table, .table-responsive { display: block !important; width: 100% !important; }
    }
  </style>
</head>
<body class="text-slate-800 antialiased h-[100dvh] w-full overflow-hidden flex flex-col" x-data="managerApp()">
  <div class="bg-mesh-container"><div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div></div>

  <!-- Login Screen -->
  <div x-show="!isLoggedIn" class="flex-1 flex items-center justify-center p-4 relative z-10">
     <div class="bg-white/60 backdrop-blur-2xl p-8 rounded-[2rem] shadow-xl w-full max-w-md border border-white/80">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-white text-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-5 shadow-sm border border-indigo-50"><i class="fa fa-lock text-2xl"></i></div>
            <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">Welcome Back</h2>
        </div>
        <div x-show="loginError" class="bg-rose-50 border border-rose-200 text-rose-600 p-4 rounded-xl text-sm mb-6 font-semibold"><span x-text="loginError"></span></div>
        <div class="space-y-5">
           <div>
              <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Username</label>
              <select x-model="loginUser" class="w-full border border-white/60 p-3.5 rounded-xl outline-none bg-white/50 text-slate-700 font-medium shadow-sm">
                  <option value="">-- Select Username --</option>
                  <template x-for="u in managerUsernames" :key="u"><option :value="u" x-text="u"></option></template>
              </select>
           </div>
           <div>
              <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-2 ml-1">Password</label>
              <input type="password" x-model="loginPass" class="w-full border border-white/60 p-3.5 rounded-xl outline-none bg-white/50 text-slate-700 shadow-sm" placeholder="••••••••">
           </div>
           <button @click="doLogin" :disabled="isLoggingIn" class="w-full bg-slate-900 text-white font-bold p-4 rounded-xl hover:bg-indigo-600 transition-all mt-4">
              <span x-show="!isLoggingIn">Sign In to Dashboard</span>
              <span x-show="isLoggingIn">Loading...</span>
           </button>
        </div>
     </div>
  </div>

  <!-- Loading Overlay -->
  <div x-show="isLoggedIn && isLoading" class="fixed inset-0 bg-white/40 backdrop-blur-lg flex flex-col items-center justify-center z-[100]">
      <div class="animate-spin rounded-full border-4 border-t-4 border-slate-300 border-t-indigo-600 h-16 w-16 mb-6"></div>
      <h2 class="text-xl font-bold" x-text="loadingMessage"></h2>
  </div>

  <!-- Main Portal -->
  <div x-show="isLoggedIn && !isLoading" style="display: none;" class="flex flex-col md:flex-row flex-1 overflow-hidden relative z-10">
    <aside class="w-72 bg-slate-900/95 backdrop-blur-2xl text-slate-300 flex flex-col shrink-0 border-r border-slate-800/50 hidden md:flex">
      <div class="p-6 border-b border-slate-800/50">
          <h1 class="text-lg font-extrabold text-white">Manager Portal</h1>
          <p class="text-sm text-indigo-400 font-bold mt-2" x-text="loggedInManagerName"></p>
      </div>
      <div class="flex-1 overflow-y-auto p-4 flex flex-col gap-4">
          <div>
              <p class="text-[11px] uppercase font-bold text-slate-500 mb-3 pl-2">Departments</p>
              <div class="space-y-2">
                  <template x-for="dept in managerDepts" :key="dept.name">
                      <label class="flex items-center p-3 rounded-xl border cursor-pointer bg-slate-800/40 border-slate-700/50">
                          <input type="radio" :value="dept.name" x-model="selectedDept" @change="selectedTraining = ''" class="hidden">
                          <span class="text-xs font-bold flex-1" :class="selectedDept === dept.name ? 'text-indigo-400' : ''" x-text="dept.name"></span>
                          <span x-show="dept.pendingCount > 0" class="text-[10px] font-bold px-2 py-0.5 rounded-md bg-rose-500/10 text-rose-400" x-text="dept.pendingCount"></span>
                      </label>
                  </template>
              </div>
          </div>
          <div x-show="selectedDept" class="border-t border-slate-800/50 pt-4 mt-2">
              <div class="space-y-2">
                  <template x-for="t in filteredTrainings" :key="t.key">
                      <button @click="selectTrainingCard(t)" class="w-full text-left px-4 py-3 rounded-xl block bg-slate-800/40 border border-slate-700/50 text-slate-300" :class="selectedTraining === t.key ? 'bg-indigo-600 text-white' : ''">
                        <div class="font-bold text-xs truncate" x-text="t.course"></div>
                        <div class="text-[10px] mt-1.5 flex justify-between font-medium">
                          <span x-text="t.date"></span>
                          <span x-show="t.isFullyReviewed" class="text-emerald-400">Reviewed</span>
                          <span x-show="!t.isFullyReviewed && t.isLocked" class="text-rose-400">Locked</span>
                          <span x-show="!t.isFullyReviewed && !t.isLocked" x-text="t.hoursLeft + 'h left'"></span>
                        </div>
                      </button>
                  </template>
              </div>
          </div>
      </div>
      <div class="p-4 border-t border-slate-800/50 bg-slate-900/50 flex gap-2">
          <button @click="fetchData()" class="flex-1 bg-slate-800 text-slate-200 py-2.5 rounded-xl text-xs font-bold">Refresh</button>
          <button @click="logout" class="flex-1 bg-rose-500/10 text-rose-400 py-2.5 rounded-xl text-xs font-bold">Logout</button>
      </div>
    </aside>

    <main class="flex-1 overflow-y-auto p-4 md:p-6 relative flex flex-col w-full">
      <div x-show="selectedTraining && localRecords.length > 0" class="w-full flex-1 mx-auto">
          <div class="mb-5 flex flex-col md:flex-row justify-between gap-4 bg-white/40 p-4 rounded-xl border border-white/60">
              <div>
                  <h2 class="text-xl font-extrabold text-slate-900">Review Needed</h2>
                  <p class="text-xs font-bold text-indigo-700 mt-2" x-text="selectedTraining"></p>
              </div>
              <div>
                   <button x-show="!activeTrainingObj?.isFullyReviewed && !activeTrainingObj?.isLocked" @click="executeSubmit" class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold w-full">Submit Reviewed</button>
                   <div x-show="activeTrainingObj?.isFullyReviewed" class="bg-emerald-100 text-emerald-700 px-6 py-3 rounded-xl font-bold text-center">Review Completed</div>
                   <div x-show="activeTrainingObj?.isLocked && !activeTrainingObj?.isFullyReviewed" class="bg-rose-100 text-rose-700 px-6 py-3 rounded-xl font-bold text-center">Locked (Time Expired)</div>
              </div>
          </div>

          <div class="flex flex-col xl:flex-row gap-5">
              <!-- Absent Section -->
              <div x-show="absentRecords.length > 0" class="flex-1 w-full bg-white/60 rounded-xl border border-white/80 flex flex-col p-4">
                  <h3 class="font-extrabold text-rose-600 mb-4">Absent Employees</h3>
                  <div class="table-responsive w-full">
                      <table class="w-full text-left">
                          <thead><tr class="text-slate-500 text-xs"><th class="py-2">Employee</th><th class="py-2">Details</th><th class="py-2">Set Status</th><th class="py-2">Note</th></tr></thead>
                          <tbody>
                              <template x-for="rec in absentRecords" :key="rec.db_id">
                                  <tr class="border-t border-white/40">
                                      <td class="py-3 font-bold text-sm" x-text="rec.empName"></td>
                                      <td class="py-3 text-xs text-rose-600 font-bold" x-text="rec.originalStatus"></td>
                                      <td class="py-3 pr-2">
                                        <select x-model="rec.status" :disabled="rec.isAlreadyReviewed || activeTrainingObj?.isLocked" class="w-full border rounded-lg p-2 text-xs font-bold">
                                            <option value="No">No (Absent)</option><option value="Permission">Permission</option><option value="At Duty">At Duty</option><option value="Yes">Yes</option>
                                        </select>
                                      </td>
                                      <td class="py-3"><textarea x-model="rec.managerNote" rows="1" :disabled="rec.isAlreadyReviewed || activeTrainingObj?.isLocked" class="w-full border rounded-lg p-2 text-xs" placeholder="Note..."></textarea></td>
                                  </tr>
                              </template>
                          </tbody>
                      </table>
                  </div>
              </div>

              <!-- Late Section -->
              <div x-show="lateRecords.length > 0" class="flex-1 w-full bg-white/60 rounded-xl border border-white/80 flex flex-col p-4">
                  <h3 class="font-extrabold text-amber-600 mb-4">Late Arrivals</h3>
                  <div class="table-responsive w-full">
                      <table class="w-full text-left">
                          <thead><tr class="text-slate-500 text-xs"><th class="py-2">Employee</th><th class="py-2">Duration</th><th class="py-2">Status</th><th class="py-2">Note</th></tr></thead>
                          <tbody>
                              <template x-for="rec in lateRecords" :key="rec.db_id">
                                  <tr class="border-t border-white/40">
                                      <td class="py-3 font-bold text-sm" x-text="rec.empName"></td>
                                      <td class="py-3 text-xs text-amber-600 font-bold"><span x-text="rec.partDuration + ' / ' + rec.totalDuration"></span></td>
                                      <td class="py-3 pr-2"><div class="bg-amber-100 text-amber-700 px-3 py-1 rounded text-xs font-bold inline-block">Late</div></td>
                                      <td class="py-3"><textarea x-model="rec.managerNote" rows="1" :disabled="rec.isAlreadyReviewed || activeTrainingObj?.isLocked" class="w-full border rounded-lg p-2 text-xs" placeholder="Optional note..."></textarea></td>
                                  </tr>
                              </template>
                          </tbody>
                      </table>
                  </div>
              </div>
          </div>
      </div>
    </main>
  </div>

<script>
    const SUPABASE_URL = 'https://hqphpfyvhqqupqyrpmvn.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhxcGhwZnl2aHFxdXBxeXJwbXZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MjkwODQsImV4cCI6MjA5MzAwNTA4NH0.GRWqD3gFLEZw3s9ox4sGNO2X9KaONTvC_oe-qRgu_TI';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function managerApp() {
        return {
            managerUsernames:[], isLoggedIn: false, loginUser: '', loginPass: '', loginError: '',
            isLoggingIn: false, loggedInManagerName: '', loggedInManagerDepts: [], resetTimes: [],
            isLoading: false, loadingMessage: '', records: [], settings:[],
            selectedDept: '', selectedTraining: '', localRecords:[],
            nowTimer: new Date().getTime(),

            get absentRecords() { return this.localRecords.filter(r => r.originalStatus !== 'Late'); },
            get lateRecords() { return this.localRecords.filter(r => r.originalStatus === 'Late'); },
            get activeTrainingObj() {
                if(!this.selectedDept || !this.selectedTraining) return null;
                return this.getTrainingsNeedingReview(this.selectedDept).find(t => t.key === this.selectedTraining) || null;
            },
            get filteredTrainings() { return this.getTrainingsNeedingReview(this.selectedDept); },
            get managerDepts() {
                return this.loggedInManagerDepts.map(d => ({
                    name: d, pendingCount: this.getTrainingsNeedingReview(d).filter(t => !t.isFullyReviewed).length
                }));
            },

            async init() {
                setInterval(() => { this.nowTimer = new Date().getTime(); }, 1000);
                const { data } = await supabase.from('Settings').select('Manager');
                if(data) this.managerUsernames = [...new Set(data.map(s => s.Manager).filter(Boolean))];
            },

            async doLogin() {
                if(!this.loginUser || !this.loginPass) return this.loginError = "Fill all fields";
                this.isLoggingIn = true;
                const { data } = await supabase.from('Settings').select('*').eq('Manager', this.loginUser).eq('Password', this.loginPass);
                this.isLoggingIn = false;
                if (data && data.length > 0) {
                    this.isLoggedIn = true; this.loggedInManagerName = this.loginUser;
                    this.loggedInManagerDepts =[...new Set(data.map(r => r.Department))];
                    this.fetchData();
                } else this.loginError = "Access denied";
            },

            async fetchData() {
                this.isLoading = true; this.loadingMessage = 'Loading...';
                const { data: recs } = await supabase.from('TrainingRecord').select('*');
                if(recs) this.records = recs;
                const { data: locks } = await supabase.from('ManagerLocks').select('*').eq('manager', this.loggedInManagerName);
                if(locks) this.resetTimes = locks;
                this.isLoading = false;
            },

            getTrainingsNeedingReview(dept) {
                if(!dept || !this.records.length) return[];
                const now = new Date().getTime();
                const map = new Map();
                this.records.forEach(r => {
                    if(r.department !== dept || !['No', 'Late'].includes(r.status)) return;
                    const key = `${r.course}|${r.date}`;
                    if(!map.has(key)) map.set(key, { key, course: r.course, date: r.date, totalPending: 0, totalReviewed: 0 });
                    const g = map.get(key);
                    if (r.managerNote && r.managerNote.trim() !== '') g.totalReviewed++; else g.totalPending++;
                });

                const result =[];
                map.forEach(t => {
                    if (t.totalPending === 0 && t.totalReviewed === 0) return;
                    let baseDate = new Date(t.date + 'T00:00:00').getTime();
                    let maxHours = 48;
                    const lock = this.resetTimes.find(l => l.course === t.course && l.date === t.date);
                    if (lock) {
                        if(lock.is_hidden) return;
                        baseDate = new Date(lock.timestamp).getTime();
                        maxHours = lock.duration;
                    }
                    const expiresAt = baseDate + (maxHours * 60 * 60 * 1000);
                    const hoursLeft = Math.max(0, (expiresAt - now) / (1000 * 60 * 60));
                    
                    result.push({ ...t, isFullyReviewed: t.totalPending === 0, hoursLeft: Math.floor(hoursLeft), isLocked: hoursLeft <= 0, expiresAt });
                });
                return result.sort((a, b) => b.hoursLeft - a.hoursLeft);
            },

            selectTrainingCard(t) {
                this.selectedTraining = t.key;
                const [course, date] = t.key.split('|');
                this.localRecords = this.records.filter(r => r.department === this.selectedDept && r.course === course && r.date === date &&['No','Late'].includes(r.status)).map(r => ({
                    ...r, originalStatus: r.status, isAlreadyReviewed: !!(r.managerNote && r.managerNote.trim() !== '')
                }));
            },

            async executeSubmit() {
                this.isLoading = true;
                for (let rec of this.localRecords) {
                    if (rec.isAlreadyReviewed) continue;
                    let finalNote = rec.managerNote ? rec.managerNote.trim() : '.';
                    await supabase.from('TrainingRecord').update({ status: rec.status, managerNote: finalNote + ` (By: ${this.loggedInManagerName})` }).eq('db_id', rec.db_id);
                }
                alert("Submitted successfully!");
                this.selectedTraining = '';
                this.fetchData();
            },
            logout() { location.reload(); }
        }
    }
</script>
</body></html>
