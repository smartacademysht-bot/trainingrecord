<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>پۆرتاڵی بەڕێوەبەر</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    /* ===== THEME VARIABLES ===== */
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --accent: #58a6ff;
      --accent2: #7c3aed;
      --gold: #e3b341;
      --rose: #f85149;
      --emerald: #3fb950;
      --amber: #d29922;
      --text: #e6edf3;
      --text2: #8b949e;
      --text3: #6e7681;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    [data-theme="light"] {
      --bg: #f0f4f8;
      --surface: #ffffff;
      --surface2: #f3f6fa;
      --border: #d0d7de;
      --accent: #0969da;
      --accent2: #8250df;
      --gold: #9a6700;
      --rose: #cf222e;
      --emerald: #1a7f37;
      --amber: #9a6700;
      --text: #1f2328;
      --text2: #656d76;
      --text3: #8c959f;
      --shadow: 0 4px 24px rgba(0,0,0,0.1);
    }

    * { box-sizing: border-box; }
    body {
      font-family: 'Vazirmatn', sans-serif;
      background: var(--bg);
      color: var(--text);
      direction: rtl;
      transition: background 0.3s, color 0.3s;
    }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .grid-bg {
      background-image: 
        linear-gradient(rgba(88,166,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(88,166,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    [data-theme="light"] .grid-bg {
      background-image: 
        linear-gradient(rgba(9,105,218,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(9,105,218,0.05) 1px, transparent 1px);
    }

    .glow-blue { box-shadow: 0 0 20px rgba(88,166,255,0.15); }
    [data-theme="light"] .glow-blue { box-shadow: 0 0 20px rgba(9,105,218,0.12); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes shimmer { 0% { transform: translateX(150%) skewX(-20deg); } 100% { transform: translateX(-150%) skewX(-20deg); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes float { 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-8px); } }
    @keyframes borderGlow { 0%,100%{ border-color:var(--border); } 50%{ border-color:rgba(88,166,255,0.4); } }
    @keyframes helpPulse { 0%,100%{ box-shadow:0 0 0 0 rgba(88,166,255,0.4); } 50%{ box-shadow:0 0 0 12px rgba(88,166,255,0); } }
    @keyframes spotlightFade { 0%{ opacity:0; } 100%{ opacity:1; } }
    @keyframes helpStepIn { from{ opacity:0; transform:translateX(20px); } to{ opacity:1; transform:translateX(0); } }

    .fade-up { animation: fadeUp 0.35s cubic-bezier(0.16,1,0.3,1) both; }
    .spin { animation: spin 1s linear infinite; }
    .float { animation: float 3s ease-in-out infinite; }
    .login-card { animation: borderGlow 4s ease-in-out infinite; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; }
    .card-hover { transition: all 0.2s; }
    .card-hover:hover { border-color: var(--accent); background: var(--surface2); }

    .nav-btn {
      width: 100%; text-align: right; padding: 10px 14px; border-radius: 8px;
      border: 1px solid transparent; font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all 0.15s; background: transparent; color: var(--text2);
      display: flex; align-items: center; gap: 8px; flex-direction: row-reverse;
    }
    .nav-btn:hover { background: var(--surface2); color: var(--text); }
    .nav-btn.active { background: rgba(88,166,255,0.1); border-color: rgba(88,166,255,0.3); color: var(--accent); }
    [data-theme="light"] .nav-btn.active { background: rgba(9,105,218,0.08); border-color: rgba(9,105,218,0.25); color: var(--accent); }

    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th { padding: 10px 14px; text-align: right; font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); white-space: nowrap; }
    .data-table td { padding: 12px 14px; font-size: 13px; border-bottom: 1px solid rgba(48,54,61,0.5); vertical-align: middle; }
    [data-theme="light"] .data-table td { border-bottom: 1px solid rgba(208,215,222,0.5); }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tbody tr { transition: background 0.15s; }
    .data-table tbody tr:hover { background: rgba(0,0,0,0.02); }
    [data-theme="light"] .data-table tbody tr:hover { background: rgba(0,0,0,0.02); }

    .custom-check { width: 18px; height: 18px; border: 2px solid var(--border); border-radius: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; background: var(--surface); flex-shrink: 0; }
    .custom-check.checked { background: var(--accent); border-color: var(--accent); }
    .custom-check:hover { border-color: var(--accent); }

    .fancy-select { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 8px 12px; font-family: 'Vazirmatn', sans-serif; font-size: 13px; font-weight: 600; outline: none; cursor: pointer; transition: border-color 0.15s; appearance: none; -webkit-appearance: none; width: 100%; }
    .fancy-select:focus { border-color: var(--accent); }
    .fancy-select:disabled { opacity: 0.5; cursor: not-allowed; }

    .fancy-textarea { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 8px 12px; font-family: 'Vazirmatn', sans-serif; font-size: 13px; outline: none; resize: vertical; width: 100%; min-height: 36px; transition: border-color 0.15s; line-height: 1.5; }
    .fancy-textarea:focus { border-color: var(--accent); }
    .fancy-textarea:disabled { opacity: 0.5; cursor: not-allowed; }
    .fancy-textarea::placeholder { color: var(--text3); }

    .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 700; }

    .btn-primary { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 10px 20px; font-family: 'Vazirmatn', sans-serif; font-size: 13px; font-weight: 800; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 8px; }
    [data-theme="dark"] .btn-primary { color: #0d1117; }
    .btn-primary:hover { filter: brightness(1.12); transform: translateY(-1px); }
    .btn-primary:active { transform: scale(0.97); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-ghost { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 18px; font-family: 'Vazirmatn', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 8px; }
    .btn-ghost:hover { background: var(--border); color: var(--text); }

    .progress-track { background: var(--surface2); border-radius: 100px; height: 6px; overflow: hidden; border: 1px solid var(--border); }
    .progress-fill { height: 100%; border-radius: 100px; transition: width 1s ease; position: relative; overflow: hidden; }
    .progress-fill::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); animation: shimmer 2s infinite; }

    .loader-ring { width: 48px; height: 48px; border: 3px solid var(--surface2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.9s linear infinite; }

    .toast { position: fixed; bottom: 24px; right: 50%; transform: translateX(50%); z-index: 9999; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 20px; display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; box-shadow: var(--shadow); animation: fadeUp 0.3s ease; }

    .status-no { color: var(--rose); background: rgba(248,81,73,0.1); border-color: rgba(248,81,73,0.25); }
    .status-late { color: var(--amber); background: rgba(210,153,34,0.1); border-color: rgba(210,153,34,0.25); }
    .status-perm { color: #a78bfa; background: rgba(167,139,250,0.1); border-color: rgba(167,139,250,0.25); }
    .status-duty { color: var(--accent); background: rgba(88,166,255,0.1); border-color: rgba(88,166,255,0.25); }
    .status-yes { color: var(--emerald); background: rgba(63,185,80,0.1); border-color: rgba(63,185,80,0.25); }

    .section-line { display: flex; align-items: center; gap: 12px; }
    .section-line::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .bulk-bar { background: rgba(88,166,255,0.08); border: 1px solid rgba(88,166,255,0.25); border-radius: 10px; padding: 10px 16px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

    /* Theme toggle */
    .theme-toggle { width: 44px; height: 24px; background: var(--surface2); border: 1px solid var(--border); border-radius: 100px; position: relative; cursor: pointer; transition: all 0.3s; }
    .theme-toggle-knob { width: 18px; height: 18px; border-radius: 50%; position: absolute; top: 2px; transition: all 0.3s; display: flex; align-items: center; justify-content: center; font-size: 9px; }
    [data-theme="dark"] .theme-toggle-knob { right: 2px; background: #1d4ed8; color: #fff; }
    [data-theme="light"] .theme-toggle-knob { left: 2px; background: #fbbf24; color: #fff; }

    /* ===== HELP OVERLAY ===== */
    .help-overlay { position: fixed; inset: 0; z-index: 500; pointer-events: none; }
    /* Backdrop transparent — spotlight's own box-shadow darkens everything around the hole */
    .help-backdrop { position: fixed; inset: 0; background: transparent; z-index: 501; pointer-events: all; }

    .help-spotlight {
      position: fixed; z-index: 502; pointer-events: none;
      border-radius: 14px;
      /* The spotlight itself is fully transparent - it's a clear "hole" through the backdrop */
      background: transparent;
      /* Ring glow around the highlighted element */
      outline: 3px solid var(--accent);
      outline-offset: 2px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.78), 0 0 30px rgba(88,166,255,0.6);
      transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
      animation: helpPulse 2s ease-in-out infinite;
    }
    [data-theme="light"] .help-spotlight {
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.6), 0 0 30px rgba(9,105,218,0.5);
    }

    .help-tooltip {
      position: fixed; z-index: 503;
      background: var(--surface); border: 1px solid var(--accent);
      border-radius: 14px; padding: 18px 22px; max-width: 340px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
      animation: helpStepIn 0.35s cubic-bezier(0.16,1,0.3,1) both;
      pointer-events: all;
    }

    .help-step-num { width: 28px; height: 28px; border-radius: 50%; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 900; flex-shrink: 0; }
    [data-theme="dark"] .help-step-num { color: #0d1117; }
    .help-step-dots { display: flex; gap: 6px; }
    .help-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); transition: all 0.2s; }
    .help-dot.active { background: var(--accent); width: 20px; border-radius: 100px; }

    /* Sidebar mobile */
    .sidebar-mobile { transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); }

    @media (max-width: 768px) {
      input, textarea, select { font-size: 16px !important; }
      .data-table thead { display: none; }
      .data-table tbody { display: flex; flex-direction: column; gap: 12px; }
      .data-table tr { display: grid; grid-template-columns: auto 1fr auto; grid-template-areas: "chk name time" "chk badges badges" "chk select select" "chk note note"; gap: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; align-items: start; }
      .data-table td { display: block; padding: 0; border: none; }
      .data-table td:nth-child(1) { grid-area: chk; padding-top: 2px; }
      .data-table td:nth-child(2) { grid-area: name; }
      .data-table td:nth-child(3) { grid-area: badges; }
      .data-table td:nth-child(4) { grid-area: time; text-align: left; }
      .data-table td:nth-child(5) { grid-area: select; }
      .data-table td:nth-child(6) { grid-area: note; }
    }
  </style>
</head>

<body class="h-screen w-screen overflow-hidden flex flex-col grid-bg" x-data="managerApp()" :data-theme="theme">

<!-- ==================== LOGIN ==================== -->
<div x-show="!isLoggedIn" class="flex-1 flex items-center justify-center p-4 fade-up overflow-y-auto">
  <div class="card login-card w-full max-w-sm p-8 glow-blue">
    
    <!-- Theme + Lang toggles at top -->
    <div class="flex items-center justify-between mb-6">
      <button @click="toggleTheme()" class="theme-toggle" :title="t('toggleTheme')">
        <div class="theme-toggle-knob">
          <i :class="theme === 'dark' ? 'fa fa-moon' : 'fa fa-sun'"></i>
        </div>
      </button>
      <button @click="toggleLang()" class="btn-ghost text-xs px-3 py-1.5 flex items-center gap-2">
        <i class="fa fa-language"></i>
        <span x-text="lang === 'ckb' ? 'English' : 'کوردی'"></span>
      </button>
    </div>

    <div class="text-center mb-8">
      <div class="w-14 h-14 rounded-xl bg-gradient-to-br from-blue-600 to-violet-700 flex items-center justify-center mx-auto mb-4 float" style="box-shadow: 0 8px 32px rgba(88,166,255,0.3)">
        <i class="fa-solid fa-fingerprint text-white text-xl"></i>
      </div>
      <h1 class="text-xl font-black" style="color:var(--text)" x-text="t('portalTitle')"></h1>
      <p class="text-xs mt-1" style="color:var(--text3)" x-text="t('portalSubtitle')"></p>
    </div>

    <div x-show="loginError" style="display:none;" class="mb-5 p-3 rounded-lg text-sm font-semibold flex items-start gap-2 fade-up" style="background:rgba(248,81,73,0.1); border:1px solid rgba(248,81,73,0.3); color:var(--rose)">
      <i class="fa fa-exclamation-circle mt-0.5"></i>
      <span x-text="loginError"></span>
    </div>

    <div class="space-y-4">
      <div>
        <label class="block text-xs font-bold mb-2 uppercase tracking-wider" style="color:var(--text3)" x-text="t('username')"></label>
        <div class="relative">
          <select x-model="loginUser" class="fancy-select pr-10" style="padding-right:36px">
            <option value="" x-text="t('selectUser')">-- هەڵبژێرە --</option>
            <template x-for="u in managerUsernames" :key="u">
              <option :value="u" x-text="u"></option>
            </template>
          </select>
          <i class="fa fa-user absolute top-3 right-3 text-xs" style="color:var(--text3)"></i>
        </div>
        <div x-show="managerUsernames.length === 0" class="text-xs mt-1 font-medium" style="color:var(--accent)">
          <i class="fa fa-circle-notch fa-spin ml-1"></i> <span x-text="t('loadingList')"></span>
        </div>
      </div>

      <div>
        <label class="block text-xs font-bold mb-2 uppercase tracking-wider" style="color:var(--text3)" x-text="t('password')"></label>
        <div class="relative">
          <input :type="showPassword ? 'text' : 'password'" x-model="loginPass" @keyup.enter="doLogin"
            class="fancy-select pr-10 w-full" :placeholder="t('passwordPlaceholder')" style="padding-right:36px">
          <i class="fa fa-key absolute top-3 right-3 text-xs" style="color:var(--text3)"></i>
          <button type="button" @click="showPassword = !showPassword"
            class="absolute top-2.5 left-3 text-xs transition-colors" style="color:var(--text3)">
            <i :class="showPassword ? 'fa fa-eye-slash' : 'fa fa-eye'"></i>
          </button>
        </div>
      </div>

      <label class="flex items-center gap-3 cursor-pointer">
        <div class="custom-check" :class="rememberMe ? 'checked' : ''" @click="rememberMe = !rememberMe">
          <i x-show="rememberMe" class="fa fa-check text-xs text-white" style="font-size:10px"></i>
        </div>
        <span class="text-sm font-medium" style="color:var(--text2)" x-text="t('rememberMe')"></span>
      </label>

      <button @click="doLogin" :disabled="isLoggingIn" class="btn-primary w-full justify-center mt-2">
        <i class="fa fa-sign-in-alt" x-show="!isLoggingIn"></i>
        <i class="fa fa-circle-notch fa-spin" x-show="isLoggingIn" style="display:none"></i>
        <span x-show="!isLoggingIn" x-text="t('login')"></span>
        <span x-show="isLoggingIn" style="display:none" x-text="t('loggingIn')"></span>
      </button>

      <!-- Help button on login -->
      <button @click="startHelp()" class="w-full text-center text-xs font-semibold mt-2 py-2 rounded-lg transition-colors"
        style="color:var(--accent); background:rgba(88,166,255,0.06); border:1px solid rgba(88,166,255,0.15)">
        <i class="fa fa-circle-question mr-1"></i>
        <span x-text="t('helpBtn')"></span>
      </button>
    </div>
  </div>
</div>

<!-- ==================== LOADING ==================== -->
<div x-show="isLoggedIn && isLoading" style="display:none" class="fixed inset-0 z-[100] flex flex-col items-center justify-center fade-up" style="background:rgba(13,17,23,0.85); backdrop-filter:blur(8px)">
  <div class="loader-ring mb-5"></div>
  <p class="font-bold text-lg" x-text="loadingMessage"></p>
  <p class="text-sm mt-1" style="color:var(--text3)" x-text="t('pleaseWait')"></p>
</div>

<!-- ==================== MAIN APP ==================== -->
<div x-show="isLoggedIn && !isLoading" style="display:none" class="flex flex-col md:flex-row flex-1 overflow-hidden fade-up">

  <!-- Mobile top bar -->
  <div class="md:hidden flex items-center justify-between px-4 py-3 shrink-0 border-b" style="background:var(--surface); border-color:var(--border)">
    <button @click="mobileMenuOpen = true" class="p-2 rounded-lg" style="color:var(--text2)">
      <i class="fa fa-bars"></i>
    </button>
    <div class="text-center">
      <div class="text-sm font-black" style="color:var(--text)" x-text="t('portalTitle')"></div>
      <div class="text-xs" style="color:var(--accent)" x-text="t('attendanceSystem')"></div>
    </div>
    <div class="w-8 h-8 rounded-lg flex items-center justify-center text-xs font-black" style="background:var(--accent); color:#0d1117" x-text="loggedInManagerName.charAt(0)"></div>
  </div>

  <!-- Mobile overlay -->
  <div x-show="mobileMenuOpen" style="display:none" class="fixed inset-0 z-50 md:hidden" @click="mobileMenuOpen = false" style="background:rgba(0,0,0,0.6); backdrop-filter:blur(4px)"></div>

  <!-- ===== SIDEBAR ===== -->
  <aside id="help-sidebar" class="fixed inset-y-0 right-0 z-[60] w-72 flex flex-col shrink-0 border-l sidebar-mobile md:relative md:translate-x-0"
    :class="mobileMenuOpen ? 'translate-x-0' : 'translate-x-full'"
    style="background:var(--surface); border-color:var(--border)">

    <!-- Header -->
    <div class="p-5 border-b shrink-0" style="border-color:var(--border)">
      <div class="hidden md:flex items-center justify-between gap-3 mb-4">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 rounded-lg flex items-center justify-center text-white" style="background:linear-gradient(135deg,#1d4ed8,#7c3aed)">
            <i class="fa-solid fa-fingerprint"></i>
          </div>
          <div>
            <div class="font-black text-sm" style="color:var(--text)" x-text="t('portalTitle')"></div>
            <div class="text-xs" style="color:var(--accent)" x-text="t('attendanceSystem')"></div>
          </div>
        </div>
        <!-- Theme + lang toggles -->
        <div class="flex items-center gap-2">
          <button @click="toggleTheme()" class="theme-toggle w-9 h-5" :title="t('toggleTheme')" style="width:36px;height:20px">
            <div class="theme-toggle-knob" style="width:15px;height:15px;top:1.5px;font-size:8px">
              <i :class="theme === 'dark' ? 'fa fa-moon' : 'fa fa-sun'"></i>
            </div>
          </button>
          <button @click="toggleLang()" class="btn-ghost text-xs px-2 py-1" style="font-size:10px;padding:4px 8px">
            <span x-text="lang === 'ckb' ? 'EN' : 'KU'"></span>
          </button>
        </div>
      </div>

      <div class="flex items-center gap-3 p-3 rounded-lg" style="background:var(--surface2)">
        <div class="w-9 h-9 rounded-lg flex items-center justify-center text-sm font-black flex-shrink-0"
          style="background:linear-gradient(135deg,var(--accent),#7c3aed); color:#0d1117"
          x-text="loggedInManagerName.charAt(0)"></div>
        <div class="overflow-hidden">
          <div class="font-bold text-sm truncate" style="color:var(--text)" x-text="loggedInManagerName"></div>
          <div class="text-xs" style="color:var(--text3)" x-text="t('manager')"></div>
        </div>
        <button @click="mobileMenuOpen = false" class="md:hidden mr-auto p-1" style="color:var(--text3)">
          <i class="fa fa-times"></i>
        </button>
      </div>
    </div>

    <!-- Scrollable nav -->
    <div class="flex-1 overflow-y-auto p-4 flex flex-col gap-5">

      <!-- Departments -->
      <div>
        <div class="section-line mb-3">
          <span class="text-xs font-black uppercase tracking-wider" style="color:var(--text3)" x-text="t('departments')"></span>
        </div>
        <div class="space-y-1" id="help-depts">

function managerApp() {
  return {
    // Lang & Theme
    lang: 'ckb',
    theme: 'dark',

    t(key) {
      return STRINGS[this.lang][key] || key;
    },
    toggleLang() {
      this.lang = this.lang === 'ckb' ? 'en' : 'ckb';
      const isRtl = this.lang === 'ckb';
      document.documentElement.lang = this.lang;
      document.documentElement.dir = isRtl ? 'rtl' : 'ltr';
      document.body.style.direction = isRtl ? 'rtl' : 'ltr';
      localStorage.setItem('portalLang', this.lang);
    },
    toggleTheme() {
      this.theme = this.theme === 'dark' ? 'light' : 'dark';
      localStorage.setItem('portalTheme', this.theme);
    },

    // Auth
    managerUsernames: [],
    isLoggedIn: false,
    loginUser: '',
    loginPass: '',
    loginError: '',
    isLoggingIn: false,
    loggedInManagerName: '',
    loggedInManagerDepts: [],
    showPassword: false,
    rememberMe: false,

    // Data
    isLoading: false,
    loadingMessage: '',
    records: [],
    settings: [],
    resetTimes: {},

    // Navigation
    selectedDept: '',
    selectedTraining: '',
    localRecords: [],
    selectedMonth: '',
    availableMonths: [],
    mobileMenuOpen: false,

    // UI state
    showToast: false,
    toastMsg: '',
    showConfirmModal: false,
    confirmMessage: '',
    nowTimer: Date.now(),

    // Bulk
    selectedAbsent: [],
    selectedLate: [],
    bulkStatusAbsent: '',
    bulkNoteLate: '',

    // Help system
    helpActive: false,
    helpStep: 0,
    helpSpotlight: { visible: false, top: 0, left: 0, width: 0, height: 0 },
    helpTooltipStyle: '',

    get helpSteps() {
      return [
        { id: 'help-depts',      title: this.t('h0t'), body: this.t('h0b') },
        { id: 'help-trainings',  title: this.t('h1t'), body: this.t('h1b') },
        { id: 'help-absent',     title: this.t('h2t'), body: this.t('h2b') },
        { id: 'help-late',       title: this.t('h3t'), body: this.t('h3b') },
        { id: 'help-submit-btn', title: this.t('h4t'), body: this.t('h4b') },
      ];
    },

    startHelp() {
      this.helpActive = true;
      this.helpStep = 0;
      this.$nextTick(() => this.positionHelp());
    },
    stopHelp() {
      this.helpActive = false;
      this.helpSpotlight.visible = false;
    },
    nextHelpStep() {
      if (this.helpStep < this.helpSteps.length - 1) {
        this.helpStep++;
        this.$nextTick(() => this.positionHelp());
      }
    },
    prevHelpStep() {
      if (this.helpStep > 0) {
        this.helpStep--;
        this.$nextTick(() => this.positionHelp());
      }
    },
    positionHelp() {
      const step = this.helpSteps[this.helpStep];
      if (!step) return;
      const el = document.getElementById(step.id);
      const pad = 10;
      const tooltipW = Math.min(340, window.innerWidth - 32);
      const tooltipH = 280; // estimated height
      const BROWSER_BAR = 60; // safe top margin to avoid browser toolbar

      if (el) {
        // Scroll element into view first (centered), then reposition
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });

        // Wait for scroll to settle before calculating positions
        setTimeout(() => {
          const r = el.getBoundingClientRect();

          this.helpSpotlight = {
            visible: true,
            top: r.top - pad,
            left: r.left - pad,
            width: r.width + pad * 2,
            height: r.height + pad * 2,
          };

          // Try: below the spotlight
          let tipTop = r.bottom + pad + 16;
          let tipLeft = r.left;

          // If tooltip would go below screen bottom, put it above
          if (tipTop + tooltipH > window.innerHeight - 16) {
            tipTop = r.top - tooltipH - pad - 16;
          }

          // If it would go above browser bar (e.g. step 3 with sidebar), center vertically on screen
          if (tipTop < BROWSER_BAR) {
            tipTop = BROWSER_BAR + 16;
          }

          // Horizontal: keep inside viewport
          if (tipLeft + tooltipW > window.innerWidth - 16) tipLeft = window.innerWidth - tooltipW - 16;
          if (tipLeft < 16) tipLeft = 16;

          this.helpTooltipStyle = `top:${tipTop}px; left:${tipLeft}px; width:${tooltipW}px; position:fixed;`;
        }, 350);
      } else {
        // Fallback: center of screen but below browser bar
        this.helpSpotlight.visible = false;
        this.helpTooltipStyle = `top:${BROWSER_BAR + 40}px; left:50%; transform:translateX(-50%); width:${tooltipW}px; position:fixed;`;
      }
    },

    // Getters
    get absentRecords() { return this.localRecords.filter(r => r.originalStatus !== 'Late'); },
    get lateRecords() { return this.localRecords.filter(r => r.originalStatus === 'Late'); },

    get isAllAbsentSelected() {
      const sel = this.absentRecords.filter(r => !r.isAlreadyReviewed);
      return sel.length > 0 && sel.every(r => this.selectedAbsent.includes(r.empId));
    },
    get isAllLateSelected() {
      const sel = this.lateRecords.filter(r => !r.isAlreadyReviewed);
      return sel.length > 0 && sel.every(r => this.selectedLate.includes(r.empId));
    },

    get activeTrainingObj() {
      if (!this.selectedDept || !this.selectedTraining) return null;
      return this.getTrainingsNeedingReview(this.selectedDept).find(t => t.key === this.selectedTraining) || null;
    },

    get filteredTrainings() {
      if (!this.selectedDept) return [];
      let trs = this.getTrainingsNeedingReview(this.selectedDept);
      if (this.selectedMonth) trs = trs.filter(t => t.date.startsWith(this.selectedMonth));
      return trs;
    },

    get managerDepts() {
      if (!this.loggedInManagerDepts || !this.loggedInManagerDepts.length) return [];
      return this.loggedInManagerDepts.map(deptName => ({
        name: deptName,
        pendingCount: this.getTrainingsNeedingReview(deptName).filter(t => !t.isFullyReviewed).length,
      }));
    },

    init() {
      // Restore preferences
      try {
        this.lang = localStorage.getItem('portalLang') || 'ckb';
        this.theme = localStorage.getItem('portalTheme') || 'dark';
        const isRtl = this.lang === 'ckb';
        document.documentElement.lang = this.lang;
        document.documentElement.dir = isRtl ? 'rtl' : 'ltr';
        document.body.style.direction = isRtl ? 'rtl' : 'ltr';
      } catch(e) {}

      this.fetchUsernames();
      this.syncPasswordsFromSheet();
      setInterval(() => this.syncPasswordsFromSheet(), 5 * 60 * 1000);
      setInterval(() => { this.nowTimer = Date.now(); }, 1000);

      try {
        const saved = localStorage.getItem('managerRemember');
        if (saved) {
          const d = JSON.parse(saved);
          if (d.user && d.pass) { this.loginUser = d.user; this.loginPass = d.pass; this.rememberMe = true; }
        }
      } catch(e) {}
      this.$watch('selectedTraining', () => {
        this.loadTargetRecords(); this.clearAbsentSelection(); this.clearLateSelection();
      });
    },

    formatCountdown(expiresAt) {
      if (!expiresAt) return '00h 00m 00s';
      const diff = expiresAt - this.nowTimer;
      if (diff <= 0) return this.t('expired');
      const h = Math.floor(diff / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      return `${String(h).padStart(2,'0')}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
    },

    async fetchAllRows(table, sortCol = null) {
      let data = [], from = 0, size = 1000, more = true;
      while (more) {
        let query = sb.from(table).select('*');
        if (sortCol) query = query.order(sortCol, { ascending: true });
        const res = await query.range(from, from + size - 1);
        if (res.error) throw res.error;
        const rows = res.data || [];
        data.push(...rows);
        more = rows.length === size;
        from += size;
      }
      return data;
    },

    async fetchUsernames() {
      try {
        const data = await this.fetchAllRows('Settings');
        if (data && data.length) {
          this.managerUsernames = [...new Set(data.map(s => String(s.Manager || s.manager || '').trim()).filter(Boolean))].sort();
        }
      } catch(e) { console.error('fetchUsernames error:', e); }
    },

    async doLogin() {
      if (!this.loginUser || !this.loginPass) { this.loginError = this.t('login') + '...'; return; }
      this.isLoggingIn = true; this.loginError = '';
      try {
        const data = await this.fetchAllRows('Settings');
        const matched = (data || []).filter(r =>
          String(r.Manager || r.manager || '').trim() === this.loginUser &&
          String(r.Password || r.password || '').trim() === this.loginPass
        );
        this.isLoggingIn = false;
        if (matched.length > 0) {
          this.isLoggedIn = true;
          this.loggedInManagerName = this.loginUser;
          this.loggedInManagerDepts = [...new Set(matched.map(r => String(r.Department || r.department || '').trim()))].filter(Boolean);
          if (this.rememberMe) localStorage.setItem('managerRemember', JSON.stringify({ user: this.loginUser, pass: this.loginPass }));
          else localStorage.removeItem('managerRemember');
          this.fetchData();
        } else {
          this.loginError = this.lang === 'ckb' ? 'دەستوور نییە. وشەی نهێنی بپشکنەرەوە.' : 'Invalid credentials. Please check your password.';
        }
      } catch(e) {
        this.isLoggingIn = false;
        this.loginError = (this.lang === 'ckb' ? 'هەڵەی پەیوەندی: ' : 'Connection error: ') + e.message;
      }
    },

    logout() {
      this.isLoggedIn = false; this.loginUser = ''; this.loginPass = '';
      this.selectedDept = ''; this.selectedTraining = ''; this.records = [];
      this.loggedInManagerDepts = []; this.mobileMenuOpen = false;
      try { localStorage.removeItem('managerRemember'); } catch(e) {}
    },

    async fetchData(onComplete = null) {
      this.isLoading = true;
      this.loadingMessage = this.lang === 'ckb' ? 'داتا بارکردن...' : 'Loading data...';
      try {
        const settingsData = await this.fetchAllRows('Settings');
        this.settings = (settingsData || []).map(s => ({
          department: String(s.Department || s.department || '').trim(),
          manager: String(s.Manager || s.manager || '').trim()
        }));

        const recData = await this.fetchAllRows('TrainingRecord', 'Date');
        this.records = (recData || []).map((r, i) => ({
          rowIndex: i,
          db_id: r.db_id || r.id,
          empId: String(r.Userid || r.empId || r.User_ID || '').trim(),
          department: String(r.Department || r.department || '').trim(),
          empName: String(r.Name || r.empName || '').trim(),
          trainer: String(r.Trainer || r.trainer || '').trim(),
          course: String(r.Topic || r.course || r.topic || '').trim(),
          date: String(r.Date || r.date || '').trim(),
          totalDuration: Number(r['Duration of training'] || r.totalDuration || 0),
          start: String(r['Check in'] || r.start || '').trim(),
          end: String(r['Check out'] || r.end || '').trim(),
          partDuration: Number(r['Emp. Duration'] || r.partDuration || 0),
          status: String(r.Status || r.status || '').trim(),
          managerNote: String(r['M.not'] || r.managerNote || '').trim()
        }));

        // FIX: ManagerLocks table may not exist — gracefully handle error
        this.resetTimes = {};
        try {
          const locksData = await this.fetchAllRows('ManagerLocks');
          (locksData || []).forEach(l => {
            if (String(l.manager || '').trim() === this.loggedInManagerName) {
              const resetKey = String(l.course || '').replace(/\s+/g,'_') + '_' + String(l.date || '');
              this.resetTimes[resetKey] = {
                timestamp: l.timestamp,
                duration: l.duration,
                isHidden: l.is_hidden
              };
            }
          });
        } catch(lockErr) {
          // Table doesn't exist or access error — not critical, just skip locks
          console.warn('ManagerLocks table not available (non-critical):', lockErr.message || lockErr);
        }

        this.isLoading = false;
        if (onComplete) onComplete();
      } catch(err) {
        this.isLoading = false;
        alert((this.lang === 'ckb' ? 'شکستی هێنا: ' : 'Failed: ') + err.message);
      }
    },

    updateMonths() {
      this.selectedMonth = '';
      if (!this.selectedDept) { this.availableMonths = []; return; }
      const trs = this.getTrainingsNeedingReview(this.selectedDept);
      const map = new Set();
      trs.forEach(t => {
        if (t.date) {
          const parts = t.date.split('-');
          if (parts.length >= 2) map.add(`${parts[0]}-${parts[1]}`);
        }
      });
      this.availableMonths = Array.from(map).sort().reverse().map(m => {
        const d = new Date(m + '-01');
        return { value: m, label: d.toLocaleDateString(this.lang === 'ckb' ? 'ckb' : 'en-GB', { month: 'long', year: 'numeric' }) };
      });
    },

    saveAutoSave(rec) {
      if (rec.isAlreadyReviewed) return;
      try {
        localStorage.setItem(`autosave_${this.selectedTraining}_${rec.empId}`, JSON.stringify({ status: rec.status, managerNote: rec.managerNote }));
      } catch(e) {}
    },

    getTrainingsNeedingReview(dept) {
      if (!dept || !this.records.length) return [];
      const now = new Date();
      const cutoffDate = new Date('2026-03-30T00:00:00').getTime();
      const trainingMap = new Map();

      this.records.forEach(r => {
        if (String(r.department).toLowerCase() !== String(dept).toLowerCase()) return;
        const stat = String(r.status).toLowerCase();
        if (!['no', 'late'].includes(stat)) return;

        const key = `${r.course}|${r.date}`;
        if (!trainingMap.has(key)) {
          trainingMap.set(key, { key, course: r.course, date: r.date, trainer: r.trainer, totalPending: 0, totalReviewed: 0, totalDuration: r.totalDuration || 0 });
        }
        const g = trainingMap.get(key);
        const note = String(r.managerNote || '').trim().toLowerCase();
        const isReviewed = note !== '' && note !== 'null' && note !== 'nan' && note !== 'undefined';
        if (isReviewed) g.totalReviewed++;
        else g.totalPending++;
      });

      const result = [];
      trainingMap.forEach(t => {
        if (t.totalPending === 0 && t.totalReviewed === 0) return;

        let trainingDate = null;
        if (t.date) {
          if (t.date.includes('/')) {
            const parts = t.date.split('/');
            if (parts.length === 3) trainingDate = new Date(`${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}T00:00:00`);
          } else {
            trainingDate = new Date(t.date + (t.date.includes('T') ? '' : 'T00:00:00'));
          }
        }
        if (!trainingDate || isNaN(trainingDate.getTime())) return;
        if (trainingDate.getTime() < cutoffDate) return;

        const resetKey = t.course.replace(/\s+/g,'_') + '_' + t.date;
        const resetObj = this.resetTimes[resetKey];
        if (resetObj && resetObj.isHidden) return;

        let baseTime = trainingDate.getTime();
        let maxHours = 48;
        if (resetObj && resetObj.timestamp) {
          const resetDate = new Date(resetObj.timestamp);
          if (!isNaN(resetDate.getTime()) && resetDate.getTime() > trainingDate.getTime()) {
            baseTime = resetDate.getTime();
            maxHours = Number(resetObj.duration) || 48;
          }
        }

        const expiresAtTime = baseTime + maxHours * 3600000;
        const msLeft = expiresAtTime - now.getTime();
        const hoursLeft = Math.max(0, msLeft / 3600000);

        result.push({
          ...t,
          pendingCount: t.totalPending,
          isFullyReviewed: t.totalPending === 0,
          hoursLeft: Math.floor(hoursLeft),
          maxHours,
          percentLeft: Math.min(100, Math.max(0, (msLeft / (maxHours * 3600000)) * 100)),
          isLocked: msLeft <= 0,
          expiresAt: expiresAtTime
        });
      });

      return result.sort((a, b) => {
        if (a.isFullyReviewed !== b.isFullyReviewed) return a.isFullyReviewed ? 1 : -1;
        if (a.isLocked !== b.isLocked) return a.isLocked ? 1 : -1;
        return b.hoursLeft - a.hoursLeft;
      });
    },

    selectTrainingCard(t) { this.selectedTraining = t.key; },

    loadTargetRecords() {
      if (!this.selectedDept || !this.selectedTraining) { this.localRecords = []; return; }
      const [course, date] = this.selectedTraining.split('|');

      this.localRecords = this.records.filter(r => {
        if (String(r.department).toLowerCase() !== String(this.selectedDept).toLowerCase()) return false;
        if (r.course !== course || r.date !== date) return false;
        const note = String(r.managerNote || '').trim().toLowerCase();
        const isReviewed = note !== '' && note !== 'null' && note !== 'nan' && note !== 'undefined';
        if (isReviewed) return true;
        const stat = String(r.status).toLowerCase();
        return stat === 'no' || stat === 'late' || stat === 'none';
      }).map((r, i) => {
        const noteStr = String(r.managerNote || '').trim();
        const isAlreadyReviewed = noteStr !== '' && noteStr.toLowerCase() !== 'null' && noteStr.toLowerCase() !== 'nan' && noteStr.toLowerCase() !== 'undefined';

        let statNorm = String(r.status).trim();
        if (statNorm.toLowerCase() === 'no') statNorm = 'No';
        else if (statNorm.toLowerCase() === 'late') statNorm = 'Late';
        else if (!statNorm || statNorm.toLowerCase() === 'none' || statNorm.toLowerCase() === 'null') statNorm = 'NONE';

        let currentStatus = statNorm;
        let currentNote = isAlreadyReviewed ? noteStr : '';

        if (!isAlreadyReviewed) {
          try {
            const saved = localStorage.getItem(`autosave_${this.selectedTraining}_${r.empId}`);
            if (saved) {
              const parsed = JSON.parse(saved);
              if (parsed.status) currentStatus = parsed.status;
              if (parsed.managerNote) currentNote = parsed.managerNote;
            }
          } catch(e) {}
        }

        return { ...r, rowIndex: i, status: currentStatus, managerNote: currentNote, originalStatus: statNorm, isAlreadyReviewed };
      }).sort((a, b) => {
        const order = { 'No': 1, 'NONE': 2, 'Late': 3 };
        return (order[a.originalStatus] || 9) - (order[b.originalStatus] || 9) || a.empName.localeCompare(b.empName);
      });
    },

    toggleAbsentSelect(empId) {
      const idx = this.selectedAbsent.indexOf(empId);
      if (idx === -1) this.selectedAbsent.push(empId);
      else this.selectedAbsent.splice(idx, 1);
    },
    toggleLateSelect(empId) {
      const idx = this.selectedLate.indexOf(empId);
      if (idx === -1) this.selectedLate.push(empId);
      else this.selectedLate.splice(idx, 1);
    },
    toggleSelectAll(type) {
      if (type === 'absent') {
        const sel = this.absentRecords.filter(r => !r.isAlreadyReviewed).map(r => r.empId);
        this.selectedAbsent = this.isAllAbsentSelected ? [] : [...sel];
      } else {
        const sel = this.lateRecords.filter(r => !r.isAlreadyReviewed).map(r => r.empId);
        this.selectedLate = this.isAllLateSelected ? [] : [...sel];
      }
    },
    clearAbsentSelection() { this.selectedAbsent = []; this.bulkStatusAbsent = ''; },
    clearLateSelection() { this.selectedLate = []; this.bulkNoteLate = ''; },

    applyBulkAbsent() {
      if (!this.bulkStatusAbsent) return;
      this.localRecords.forEach(rec => {
        if (this.selectedAbsent.includes(rec.empId) && !rec.isAlreadyReviewed) {
          rec.status = this.bulkStatusAbsent;
          this.saveAutoSave(rec);
        }
      });
      this.clearAbsentSelection();
      this.notify(this.lang === 'ckb' ? 'ستاتوسی کارمەندانی هەڵبژێردراو نوێکرایەوە' : 'Status updated for selected employees');
    },

    applyBulkLate() {
      if (!this.bulkNoteLate) return;
      this.localRecords.forEach(rec => {
        if (this.selectedLate.includes(rec.empId) && !rec.isAlreadyReviewed) {
          rec.managerNote = this.bulkNoteLate;
          this.saveAutoSave(rec);
        }
      });
      this.clearLateSelection();
      this.notify(this.lang === 'ckb' ? 'تێبینی کارمەندانی هەڵبژێردراو نوێکرایەوە' : 'Note updated for selected employees');
    },

    submitNotes() {
      let unhandled = this.localRecords.filter(r => !r.isAlreadyReviewed && !r.managerNote?.trim() && r.status === r.originalStatus).length;
      this.confirmMessage = unhandled > 0
        ? `<span style="color:var(--accent); font-weight:900; display:block; margin-bottom:8px">${unhandled} ${this.lang === 'ckb' ? 'کارمەند بێ تێبینی ماوەتەوە.' : 'employee(s) without notes.'}</span> ${this.lang === 'ckb' ? 'تێبینیە بووەکان بە (.) دەگوازرێنەوە. دڵنیایت؟' : 'Empty notes will be saved as (.). Are you sure?'}`
        : (this.lang === 'ckb' ? 'دڵنیایت کە دەتەوێت تەواوی بکەیت؟' : 'Are you sure you want to submit?');
      this.showConfirmModal = true;
    },

    async executeSubmit() {
  this.showConfirmModal = false;
  this.isLoading = true;
  this.loadingMessage = this.lang === 'ckb' ? 'ناردن...' : 'Submitting...';
  let hasError = false;
  let errorDetails = '';

  for (const rec of this.localRecords) {
    if (rec.isAlreadyReviewed) continue;

    const finalStatus = rec.originalStatus === 'Late' ? rec.originalStatus : rec.status;
    const finalNote = (rec.managerNote || '').trim() || '.';
    const noteWithAuthor = finalNote + ` (By: ${this.loggedInManagerName})`;

    // Debug: log what we're trying to update
    console.log('Updating record:', {
      db_id: rec.db_id,
      empName: rec.empName,
      finalStatus,
      noteWithAuthor
    });

    // Check if db_id is valid
    if (!rec.db_id) {
      console.error('MISSING db_id for:', rec.empName, '| full rec:', rec);
      hasError = true;
      errorDetails = 'Missing record ID for: ' + rec.empName;
      continue;
    }

    // Try with 'Status' column name first
    const { data, error } = await sb
      .from('TrainingRecord')
      .update({ 'Status': finalStatus, 'M.not': noteWithAuthor })
      .eq('db_id', rec.db_id)
      .select();

    if (error) {
      console.error('Update FAILED:', JSON.stringify(error), '| rec:', rec.empName, '| db_id:', rec.db_id);
      errorDetails = error.message || error.code || JSON.stringify(error);
      hasError = true;
    } else {
      console.log('Update SUCCESS:', rec.empName, '| rows affected:', data?.length);
      // If data is empty array, the eq() filter matched nothing
      if (data && data.length === 0) {
        console.warn('WARNING: Update succeeded but 0 rows matched for db_id:', rec.db_id);
        // Try matching by id instead
        const { data: data2, error: error2 } = await sb
          .from('TrainingRecord')
          .update({ 'Status': finalStatus, 'M.not': noteWithAuthor })
          .eq('id', rec.db_id)
          .select();
        if (error2) {
          console.error('Fallback by id also failed:', JSON.stringify(error2));
          hasError = true;
          errorDetails = error2.message;
        } else {
          console.log('Fallback by id SUCCESS:', data2?.length, 'rows');
        }
      }
    }
  }

  this.isLoading = false;
  if (hasError) {
    this.notify(`❌ ${this.lang === 'ckb' ? 'هەڵە:' : 'Error:'} ${errorDetails}`);
  } else {
    this.localRecords.forEach(r => {
      try { localStorage.removeItem(`autosave_${this.selectedTraining}_${r.empId}`); } catch(e) {}
    });
    this.notify(this.lang === 'ckb' ? 'بەسەرکەوتوویی ناردرا!' : 'Successfully submitted!');
    this.selectedTraining = '';
    this.fetchData(() => { if (this.selectedDept) this.updateMonths(); });
  }
},

    formatDuration(mins) {
      if (!mins || mins <= 0) return '0m';
      const h = Math.floor(mins / 60);
      const m = Math.round(mins % 60);
      return h > 0 ? `${h}h ${m}m` : `${m}m`;
    },

    notify(msg) {
      this.toastMsg = msg; this.showToast = true;
      setTimeout(() => { this.showToast = false; }, 3500);
    },
    // ===== GOOGLE SHEET PASSWORD SYNC =====
async syncPasswordsFromSheet() {
  const SHEET_ID = '10SwsZlPty4tU1H5eDiE16ZXgVDg-VRPtslNMq6NjoKg';
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;
  try {
    const res = await fetch(url);
    const csv = await res.text();
    const lines = csv.split(/\r?\n/).filter(l => l.trim());
    // Skip header row, parse: username, password (adjust columns as needed)
    let updated = 0;
    for (let i = 1; i < lines.length; i++) {
      const cols = lines[i].split(',').map(c => c.replace(/^"|"$/g,'').trim());
      const managerName = cols[0]; // Column A: manager name
      const newPassword  = cols[1]; // Column B: password
      if (!managerName || !newPassword) continue;
      const { error } = await sb.from('Settings')
        .update({ Password: newPassword })
        .eq('Manager', managerName);
      if (!error) updated++;
    }
    this.notify(`✓ ${updated} password(s) synced from sheet`);
  } catch(e) {
    this.notify('Sheet sync error: ' + e.message);
  }
},
  };
}
